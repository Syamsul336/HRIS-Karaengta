<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Karaengta HRIS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #F5C518;
    --yellow-dark: #D4A017;
    --red: #C0392B;
    --dark: #1C1C1E;
    --gray: #636366;
    --bg: #FFF8E1;
    --card: #FFFFFF;
    --border: #FFE082;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: linear-gradient(135deg, #FFF8E1 0%, #FFDD57 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: var(--dark);
  }
  .login-card {
    background: white;
    width: 100%;
    max-width: 420px;
    border-radius: 20px;
    padding: 40px 36px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    border: 2px solid var(--border);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }
  .logo-icon {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--yellow), #FFAB00);
    border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    box-shadow: 0 6px 16px rgba(245,197,24,.4);
  }
  .logo strong {
    font-family: 'Syne', sans-serif;
    font-size: 19px; font-weight: 800;
    color: var(--dark);
    display: block;
    line-height: 1.2;
  }
  .logo span { font-size: 12px; color: var(--gray); }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .subtitle {
    color: var(--gray);
    font-size: 14px;
    margin-bottom: 28px;
  }
  .tabs {
    display: flex;
    background: #F5F5F5;
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 22px;
  }
  .tab {
    flex: 1; padding: 9px;
    text-align: center;
    border-radius: 7px;
    cursor: pointer;
    font-size: 13px; font-weight: 600;
    color: var(--gray);
    transition: all .2s;
  }
  .tab.active {
    background: var(--yellow);
    color: var(--dark);
    box-shadow: 0 2px 6px rgba(245,197,24,.3);
  }
  .form-group { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--dark);
  }
  input {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid #F0F0F0;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    transition: border .2s;
  }
  input:focus {
    outline: none;
    border-color: var(--yellow);
  }
  .btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--yellow), var(--yellow-dark));
    color: var(--dark);
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    box-shadow: 0 4px 12px rgba(245,197,24,.3);
    transition: transform .1s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }
  .alert {
    padding: 11px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 14px;
    display: none;
  }
  .alert.show { display: block; }
  .alert-error {
    background: #FDECEA;
    color: var(--red);
    border: 1px solid #F5B7B1;
  }
  .alert-success {
    background: #E8F8F0;
    color: #1E8449;
    border: 1px solid #A9DFBF;
  }
  .footer-note {
    text-align: center;
    font-size: 12px;
    color: var(--gray);
    margin-top: 18px;
  }
</style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <div class="logo-icon">👑</div>
      <div>
        <strong>Karaengta HRIS</strong>
        <span>Sistem Manajemen SDM</span>
      </div>
    </div>

    <h1 id="title">Selamat Datang</h1>
    <p class="subtitle" id="subtitle">Masuk untuk akses dashboard HR</p>

    <div class="tabs">
      <div class="tab active" data-mode="login">Login</div>
      <div class="tab" data-mode="signup">Daftar</div>
    </div>

    <div class="alert alert-error" id="alertError"></div>
    <div class="alert alert-success" id="alertSuccess"></div>

    <form id="authForm">
      <div class="form-group" id="nameGroup" style="display:none;">
        <label for="fullName">Nama Lengkap</label>
        <input type="text" id="fullName" placeholder="Nama lengkap Anda">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="email@karaengta.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6" placeholder="Minimal 6 karakter">
      </div>
      <button type="submit" class="btn" id="submitBtn">Masuk</button>
    </form>

    <p class="footer-note">
      Akun baru perlu diaktifkan oleh admin sebelum dapat akses dashboard.
    </p>
  </div>

  <!-- Load config sebagai script biasa DULU. Wajib ada sebelum module script. -->
  <!-- Plain script bekerja di file:// — module script dengan import relatif TIDAK. -->
  <script src="./js/config.js"></script>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL      = window.SUPABASE_URL;
    const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY;

    if (!SUPABASE_URL || !SUPABASE_ANON_KEY ||
        SUPABASE_URL.includes('YOUR-PROJECT-REF') ||
        SUPABASE_ANON_KEY === 'YOUR-ANON-KEY-HERE') {
      const err = document.getElementById('alertError');
      err.textContent = '⚠️ js/config.js belum diisi. Buka file tersebut dan ganti SUPABASE_URL & SUPABASE_ANON_KEY dengan kredensial dari Supabase Dashboard (Project Settings → API).';
      err.classList.add('show');
      document.getElementById('submitBtn').disabled = true;
      throw new Error('Supabase config missing or still placeholder');
    }

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Cek session existing — kalau sudah login, langsung redirect
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      window.location.href = './dashboard.html';
    }

    let mode = 'login';
    const tabs = document.querySelectorAll('.tab');
    const title = document.getElementById('title');
    const subtitle = document.getElementById('subtitle');
    const submitBtn = document.getElementById('submitBtn');
    const nameGroup = document.getElementById('nameGroup');
    const form = document.getElementById('authForm');
    const errBox = document.getElementById('alertError');
    const okBox = document.getElementById('alertSuccess');

    tabs.forEach(t => t.addEventListener('click', () => {
      mode = t.dataset.mode;
      tabs.forEach(x => x.classList.toggle('active', x === t));
      if (mode === 'login') {
        title.textContent = 'Selamat Datang';
        subtitle.textContent = 'Masuk untuk akses dashboard HR';
        submitBtn.textContent = 'Masuk';
        nameGroup.style.display = 'none';
      } else {
        title.textContent = 'Buat Akun Baru';
        subtitle.textContent = 'Daftar untuk akses sistem HRIS';
        submitBtn.textContent = 'Daftar';
        nameGroup.style.display = 'block';
      }
      hideAlerts();
    }));

    function showError(msg) {
      okBox.classList.remove('show');
      errBox.textContent = msg;
      errBox.classList.add('show');
    }
    function showSuccess(msg) {
      errBox.classList.remove('show');
      okBox.textContent = msg;
      okBox.classList.add('show');
    }
    function hideAlerts() {
      errBox.classList.remove('show');
      okBox.classList.remove('show');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlerts();
      submitBtn.disabled = true;
      submitBtn.textContent = mode === 'login' ? 'Memproses...' : 'Mendaftarkan...';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const fullName = document.getElementById('fullName').value.trim();

      try {
        if (mode === 'signup') {
          const { data, error } = await supabase.auth.signUp({
            email, password,
            options: { data: { full_name: fullName } }
          });
          if (error) throw error;
          showSuccess('Akun berhasil dibuat! Hubungi admin untuk aktivasi sebelum bisa login.');
          form.reset();
        } else {
          const { data, error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) throw error;

          // Cek apakah user aktif
          const { data: hrUser, error: hrErr } = await supabase
            .from('hr_users').select('is_active, role').eq('id', data.user.id).single();

          if (hrErr || !hrUser) {
            await supabase.auth.signOut();
            throw new Error('Akun Anda tidak terdaftar di sistem HR.');
          }
          if (!hrUser.is_active) {
            await supabase.auth.signOut();
            throw new Error('Akun belum diaktifkan oleh admin. Silakan hubungi admin Anda.');
          }

          window.location.href = './dashboard.html';
        }
      } catch (err) {
        showError(err.message || 'Terjadi kesalahan. Coba lagi.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = mode === 'login' ? 'Masuk' : 'Daftar';
      }
    });
  </script>
</body>
</html>
